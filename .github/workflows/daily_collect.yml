name: Daily Stock Sentiment Collection

on:
  schedule:
    - cron: "0 2 * * 1-5"  # UTC 02:00 = 北京时间 10:00，周一到周五
  workflow_dispatch:         # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 允许 push DB 回仓库

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from previous run
        uses: actions/cache/restore@v4
        with:
          path: chinastocks.db
          key: chinastocks-db-${{ github.run_id }}
          restore-keys: |
            chinastocks-db-

      - name: Run daily pipeline
        run: python pipeline.py
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}

      - name: Save database for next run
        uses: actions/cache/save@v4
        with:
          path: chinastocks.db
          key: chinastocks-db-${{ github.run_id }}

      - name: Upload SQLite database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chinastocks-db-${{ github.run_id }}
          path: chinastocks.db
          retention-days: 90
